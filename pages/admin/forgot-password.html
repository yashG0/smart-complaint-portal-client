<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Forgot Password | Smart Complaint Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="auth-body" data-role="admin">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="auth-container">
    <div class="auth-card admin-card">
      <h2>Reset Admin Password</h2>

      <form id="forgotPasswordForm">
        <div class="input-group">
          <label>Admin Email</label>
          <input type="email" id="email" placeholder="Enter registered admin email" required>
        </div>

        <div class="input-group">
          <label>Verification Code</label>
          <input type="text" id="code" placeholder="Enter 6-digit code" required>
        </div>

        <div class="input-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required>
        </div>

        <div class="input-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
        </div>

        <button type="button" id="sendCodeBtn" class="auth-secondary-btn full-width">Send OTP Code</button>
        <button type="submit" id="resetBtn" class="btn-primary full-width">Reset Password</button>

        <p id="errorMessage" class="error-text"></p>
      </form>

      <div class="auth-footer">
        <a href="./login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script type="module" src="../../src/modules/auth/forgotPasswordPage.js"></script>
</body>
</html>
